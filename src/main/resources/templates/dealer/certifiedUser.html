<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
 xmlns:th="http://www.thymeleaf.org"
 xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
 xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity3"
 layout:decorator="layout">
 
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="icon" type="image/png" href="/img/Logo.png">
        <title>Dealers Dashboard | Certified User</title>
        <!--     Fonts and icons     -->
        <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
        <!-- Nucleo Icons -->
        <link href="/css/nucleo-icons.css" rel="stylesheet" />
        <link href="/css/nucleo-svg.css" rel="stylesheet" />
        <!-- Font Awesome Icons -->
        <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
        <!-- Material Icons -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
        <!-- CSS Files -->
        <link id="pagestyle" href="/css/style.css" rel="stylesheet" />    
    </head>

    <body class="g-sidenav-show  bg-gray-100">
        <div layout:fragment="content">
            <!--Side Nav Bar Start-->
            <aside class="sidenav navbar navbar-vertical navbar-expand-xs border-radius-lg fixed-start ms-2  bg-white my-2" id="sidenav-main">
                <div class="sidenav-header">
                    <i class="fas fa-times p-3 cursor-pointer text-dark opacity-5 position-absolute end-0 top-0 d-none d-xl-none" aria-hidden="true" id="iconSidenav"></i>
                    <a class="navbar-brand px-4 py-3 m-0" href="">
                        <img src="/img/Logo1.png" class="navbar-brand-img"  alt="main_logo">
                        <span class="ms-1" style="font-size:larger; font-weight: 900;">Pavnam</span>
                    </a>
                </div>
                <hr class="horizontal dark mt-0 mb-2">
                <div class="collapse navbar-collapse  w-auto " id="sidenav-collapse-main">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="/admin-dashboard">
                                <i class="material-symbols-rounded opacity-5">dashboard</i>
                                <span class="nav-link-text ms-1">Dashboard</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active text-white" style="background-color: #ff7722;" href="/certifiedUser">
                                <i class="material-symbols-rounded opacity-5">receipt_long</i>
                                <span class="nav-link-text ms-1">Certified Users</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="/registerCertifiedUser">
                                <i class="material-symbols-rounded opacity-5">view_in_ar</i>
                                <span class="nav-link-text ms-1">Certificate Generator</span>
                            </a>
                        </li>
                        <li class="nav-item mt-3">
                            <h6 class="ps-4 ms-2 text-uppercase text-xs text-dark font-weight-bolder opacity-5">Account page</h6>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="/adminProfile">
                                <i class="material-symbols-rounded opacity-5">person</i>
                                <span class="nav-link-text ms-1">Profile</span>
                            </a>
                        </li>
                    </ul>
                </div>
                <div class="sidenav-footer position-absolute w-100 bottom-0 ">
                    <div class="mx-3">
                        <a class="btn w-100" style="background-color: #ff7722; color: white;" href="/logout">Logout</a>
                    </div>
                </div>
            </aside>
            <!--Side Nav Bar End-->
            
            <main class="main-content position-relative max-height-vh-100 h-100 border-radius-lg ">
            
                <!-- Navbar Start-->
                <nav class="navbar navbar-main navbar-expand-lg px-0 mx-3 shadow-none border-radius-xl" id="navbarBlur" data-scroll="true">
                    <div class="container-fluid py-1 px-3">
                        <div class=" pb-0 pt-1 px-0 me-sm-10 " >
                            <h4 style="color: #13547a;"><span sec:authentication="principal.name">User</span> Dashboard</h4>
                        </div>
                        
                        <div class="collapse navbar-collapse mt-sm-0 mt-2 me-md-0 me-sm-4 justify-content-end" id="navbar" >
                            <nav aria-label="breadcrumb">
                                <ol class="breadcrumb bg-transparent mb-1 pb-0 pt-1 px-0 me-sm-3 me-5">
                                    <li class="breadcrumb-item text-sm"><a class="opacity-5 text-dark" href="javascript: ;">Dashboard</a></li>
                                    <li class="breadcrumb-item text-sm text-dark active" aria-current="page">Certified Users</li>
                                </ol>
                            </nav>
                    
                            <ul class="navbar-nav d-flex align-items-center  justify-content-end">
                                <li class="nav-item d-xl-none ps-3 d-flex align-items-center">
                                    <a href="javascript:;" class="nav-link text-body p-0" id="iconNavbarSidenav">
                                        <div class="sidenav-toggler-inner">
                                            <i class="sidenav-toggler-line"></i>
                                            <i class="sidenav-toggler-line"></i>
                                            <i class="sidenav-toggler-line"></i>
                                        </div>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </nav>
                <!-- End Navbar -->

                <div class="">
                    <table class="table-striped table-hover table-bordered text-center" style="width: 99%;" >
                        <thead style="background-color: #13547a; color: white; height: 50px;" >
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Email</th>
                                <th>Contact</th>
                                <th>Business Type</th>
                                <th>Owner Name</th>
                                <th>Complete Details</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${certifiedUsers}">
                                <td th:text="${user.id}"></td>
                                <td th:text="${user.firstName}"></td>
                                <td th:text="${user.lastName}"></td>
                                <td th:text="${user.email}"></td>
                                <td th:text="${user.contactNumber}"></td>
                                <td th:text="${user.businessType}"></td>
                                <td th:text="${user.ownerName}"></td>
                                <td>
                                    <a th:href="@{/certifiedUser/details/{id}(id=${user.id})}" class="btn btn-primary btn-sm" style="background-color: #ff7722; margin: 5px; margin-bottom: 5px;">
                                        View Details
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                                
                

            </main>
        </div>
        
    </body>
</html>
