<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="icon" type="image/png" href="/img/Logo.png">
  <title>Pavnam | Reset Password</title>
  <!-- Fonts and icons -->
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
  <!-- Nucleo Icons -->
  <link href="/css/nucleo-icons.css" rel="stylesheet" />
  <link href="/css/nucleo-svg.css" rel="stylesheet" />
  <!-- Font Awesome Icons -->
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <!-- Material Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <!-- CSS Files -->
  <link th:href="@{/css/style.css}" rel="stylesheet">
  <link id="pagestyle" type="text/css" rel="stylesheet" href="/css/style.css" />
</head>

<body class="bg-gray-200">
  <div class="container z-index-sticky top-0">
    <div class="row">
      <div class="col-12">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg blur border-radius-xl top-0 z-index-3 shadow position-absolute my-3 py-2 start-0 end-0 mx-4">
          <div class="container-fluid ps-2 pe-0">
            <a class="navbar-brand font-weight-bolder ms-lg-0 ms-3 " href="/">
              <img src="/img/Logo.png" alt="main_logo" style="width: 50px; border-radius: 100%;">
              <span style="font-size: 30px; font-weight: 1000; color: #13547a; margin: 10px; vertical-align: middle;"> Pavnam</span>
            </a>
            <button class="navbar-toggler shadow-none ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navigation" aria-controls="navigation" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon mt-2">
                <span class="navbar-toggler-bar bar1"></span>
                <span class="navbar-toggler-bar bar2"></span>
                <span class="navbar-toggler-bar bar3"></span>
              </span>
            </button>
            <div class="collapse navbar-collapse" id="navigation">
              <ul class="navbar-nav dropdown mx-auto">
                <li class="nav-item">
                  <a class="nav-link d-flex align-items-center me-2 active" aria-current="page" href="/">
                    <i class="fa fa-chart-pie opacity-6 text-dark me-1"></i>
                    PAVNAM HOME
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link me-2" href="/certification">
                    <i class="fa fa-user opacity-6 text-dark me-1"></i>
                    ABOUT CERTIFICATION
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link me-2" href="/about">
                    <i class="fa fa-user opacity-6 text-dark me-1"></i>
                    ABOUT US
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link me-2" href="register/admin">
                    <i class="fas fa-key opacity-6 text-dark me-1"></i>
                    DEALER REGISTRATION
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link me-2" href="register">
                    <i class="fas fa-user-circle opacity-6 text-dark me-1"></i>
                    CERTIFICATE APPLICATION
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link me-2" href="/contact">
                    <i class="fas fa-user-circle opacity-6 text-dark me-1"></i>
                    CONTACT US
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </nav>
        <!-- End Navbar -->
      </div>
    </div>
  </div>

  <main class="main-content mt-0 page login-page">
    <div class="page-header align-items-start min-vh-100 bg-gradient-pavnam" style="background-image: url('/img/galaxy.jpg');">
      <span class="mask bg-gradient-dark opacity-6"></span>
      <div class="container my-auto">
        <div class="row">
          <div class="col-lg-4 col-md-8 col-12 mx-auto" style="margin-top: 100px;">
            <div class="card z-index-0 fadeIn3 fadeInBottom">
              <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
                <div class="bg-gradient-pavnam shadow-dark border-radius-lg py-3 pe-1 text-center">
                  <img src="/img/Logo.png" style="width: 100px; border-radius: 100%;">
                  <h4 class="text-white font-weight-bolder text-center mt-2 mb-0">RESET PASSWORD</h4>
                </div>
              </div>
              <div class="card-body">
                <form th:action="@{/reset-password}" method="post" onsubmit="return validatePasswords()">
                  <div class="input-group input-group-outline my-3">
                    <input type="hidden" name="token" th:value="${token}" />
                    <label for="newPassword" class="form-label"></label>
                    <input type="password" placeholder="New Password" class="form-control" id="newPassword" name="newPassword" required>
                    <button type="button" class="btn" onclick="togglePasswordVisibility('newPassword', this)" style="background-color: #ff7722; margin-bottom: 0; padding: 10px; margin-left: 5px; border-radius: 5px;">
                      <!-- <i class="bi bi-eye" id="eye-icon-newPassword"></i> -->
                      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" class="bi bi-eye" viewBox="0 0 16 16" id="eye-icon-newPassword">
                        <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                        <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                      </svg>
                    </button>
                  </div>
                  <div class="input-group input-group-outline my-3">
                    <label for="retypePassword" class="form-label"></label>
                    <input type="password" placeholder="Retype Password" class="form-control" id="retypePassword" name="retypePassword" required>
                    <button type="button" class="btn " onclick="togglePasswordVisibility('retypePassword', this)" style="background-color: #ff7722; margin-bottom: 0; padding: 10px; margin-left: 5px; border-radius: 5px;">
                      <i class="fa fa-eye" id="eye-icon-retypePassword"></i>
                      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" class="bi bi-eye" viewBox="0 0 16 16" id="eye-icon-retypePassword">
                        <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                        <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                      </svg>
                    </button>
                  </div>
                  <input type="submit" class="btn bg-gradient-pavnam w-100 my-4 mb-2" style="color: white; margin-top: 10px !important;" value="Reset Password">
                </form>
                <p th:if="${error}" th:text="${error}"></p>
                <p th:if="${message}" th:text="${message}"></p>
                <p><a th:href="@{/login}" class="font-weight-bold" style="color: #ff7722; text-align: center;">Back to Login</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <footer class="footer position-absolute bottom-0 py-2 w-100">
        <div class="container">
          <div class="row align-items-center justify-content-lg-between">
            <div class="copyright text-center text-sm text-white text-lg-start">
              © 2025, All Rights Reserved <i class="fa fa-heart" aria-hidden="true"></i> by
              <a href="/" class="font-weight-bold text-white" target="_blank">Pavnam</a>
            </div>
          </div>
        </div>
      </footer>
    </div>
  </main>

  <script src="/js/core/bootstrap.min.js"></script>
  <script>
    function validatePasswords() {
      const newPassword = document.getElementById('newPassword').value;
      const retypePassword = document.getElementById('retypePassword').value;

      if (newPassword !== retypePassword) {
        alert("Passwords do not match. Please try again.");
        return false; // Prevent form submission
      }
      return true; // Allow form submission
    }

    function togglePasswordVisibility(inputId, button) {
      const input = document.getElementById(inputId);
      const icon = button.querySelector('i');

      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }
  </script>

</body>

</html>
