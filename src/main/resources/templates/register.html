<!DOCTYPE html>
<html lang="en"
 xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="icon" type="image/png" href="/img/Logo.png">
  <title>
    Pavnam | User Sign In
  </title>
  <!--     Fonts and icons     -->
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
  <!-- Nucleo Icons -->
  <link href="/css/nucleo-icons.css" rel="stylesheet" />
  <link href="/css/nucleo-svg.css" rel="stylesheet" />
  <!-- Font Awesome Icons -->
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <!-- Material Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <!-- CSS Files -->
  <link id="pagestyle" href="/css/style.css?v=3.2.0" rel="stylesheet" />
</head>

<body class="bg-gray-200">
  <div class="container position-sticky z-index-sticky top-0">
    <div class="row">
      <div class="col-12">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg blur border-radius-xl top-0 z-index-3 shadow position-absolute my-3 py-2 start-0 end-0 mx-4">
          <div class="container-fluid ps-2 pe-0">
            <a class="navbar-brand font-weight-bolder ms-lg-0 ms-3 " href="/">
              <img src="/img/logo.png" alt="main_logo" style="width: 50px; border-radius: 100%;">  
              <span style="font-size: 30px; font-weight: 1000; color: #13547a; margin: 15px; vertical-align: middle;"> Pavnam</span>
            </a>
            <button class="navbar-toggler shadow-none ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navigation" aria-controls="navigation" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon mt-2">
                <span class="navbar-toggler-bar bar1"></span>
                <span class="navbar-toggler-bar bar2"></span>
                <span class="navbar-toggler-bar bar3"></span>
              </span>
            </button>
            <div class="collapse navbar-collapse" id="navigation">
              <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                  <a class="nav-link d-flex align-items-center me-2 active" aria-current="page" href="/">
                    <i class="fa fa-chart-pie opacity-6 text-dark me-1"></i>
                    PAVNAM HOME
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link me-2" href="/certification">
                    <i class="fa fa-user opacity-6 text-dark me-1"></i>
                    ABOUT CERTIFICATION 
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link me-2" href="/about">
                    <i class="fa fa-user opacity-6 text-dark me-1"></i>
                    ABOUT US 
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link me-2" href="/login">
                    <i class="fas fa-key opacity-6 text-dark me-1"></i>
                    LOGIN
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link me-2" href="/register/admin">
                    <i class="fas fa-user-circle opacity-6 text-dark me-1"></i>
                    DEALER REGISTRATION
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link me-2" href="/contact">
                    <i class="fas fa-user-circle opacity-6 text-dark me-1"></i>
                    CONTACT US
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </nav>
        <!-- End Navbar -->
      </div>
    </div>
  </div>


  <main class="main-content  mt-0">
    <div class="page-header align-items-start min-vh-100 bg-gradient-pavnam" style="background-image: url('/img/galaxy1.jpg');">
        <span class="mask bg-gradient-dark opacity-6"></span>
        <div class="container my-auto">
            <div class="row" style="margin-top: 100px; margin-bottom: 100px;">
                <div class="col-lg-5 col-md-8 col-12 mx-auto" style="margin-top: 60px; ">
                    <div class="card z-index-0 fadeIn3 fadeInBottom">
                        <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
                            <div class="bg-gradient-pavnam shadow-dark border-radius-lg py-3 pe-1 text-center">
                                <img src="/img/logo.png" style="width: 100px; border-radius: 100%;">
                                <h4 class="text-white font-weight-bolder text-center mt-2 mb-0">CERTIFICATE  APPLICATION</h4>
                            </div>
                        </div>

                        <div class="card-body">
                            
                            <form action="#" th:action="@{/add}" method="post" th:object="${user}" role="form" class="text-start" enctype="multipart/form-data">

                                <div class="input-group input-group-outline my-3">
                                    <label class="form-label"></label>
                                    <input type="text" th:field="*{username}" placeholder="Username*" class="form-control" required>
                                </div>

                                <div class="input-group input-group-outline my-3">
                                    <label class="form-label"></label>
                                    <input type="email" th:field="*{email}" placeholder="Business Email Id*" pattern="[^ @]*@[^ @]*" class="form-control" required>
                                </div>

                                <div class="input-group input-group-outline my-3">
                                    <label class="form-label"></label>
                                    <input type="password" th:field="*{password}" placeholder="Password" class="form-control">
                                </div>

                                <div class="input-group input-group-outline my-3">
                                    <label class="form-label"></label>
                                    <select class="form-select form-control" th:field="*{businessType}" id="businessType"  required>
                                        <option value="">Select Business Type*</option>
                                        <option value="Small Cart">Small Cart Vendors</option>
                                        <option value="Food Truck">Food Truck</option>
                                        <option value="Small Shop">Small Food Shop</option>
                                        <option value="Resturants">Resturant/Cafe</option>
                                        <option value="Hotel">Hotel/Resort</option>
                                        <option value="Food">Food Product</option>
                                        <option value="Staff">Working Staff</option>
                                        <option value="Manufacturer">Food Manufacturer</option>
                                    </select>
                                </div>

                                <div class="input-group input-group-outline my-3">
                                    <label class="form-label"></label>
                                    <input type="text" th:field="*{contactNumber}" placeholder="Business Contact Number*" class="form-control" required>
                                </div>

                                <div class="input-group input-group-outline my-3">
                                    <label class="form-label"></label>
                                    <input type="text" th:field="*{businessAddress}" placeholder="Business Address*" class="form-control" required>
                                </div>

                                <div class="input-group input-group-outline my-3">
                                    <label class="form-label"></label>
                                    <input type="text" th:field="*{ownerName}" placeholder="Owner Name*" class="form-control" required>
                                </div>

                                <div class="input-group input-group-outline my-3">
                                    <label class="form-label"></label>
                                    <input type="text" th:field="*{fssaiLicenseNumber}" placeholder="FSSAI Registration / Licence number" class="form-control">
                                </div>

                                <div class="input-group input-group-outline mb-3">
                                    <label class="form-label"></label>
                                    <select class="form-select form-control" id="governmentId" th:field="*{govtId}" placeholder="Select Government Id" required>
                                        <option value="">Select Government ID*</option>
                                        <option value="Aadhar Card">Aadhar Card</option>
                                        <option value="PAN Card">Pan Card</option>
                                        <option value="Voters Id">Voters ID</option>
                                        <option value="Driving Licence">Driving Licence</option>
                                    </select>
                                </div>

                                <div class="input-group input-group-outline mb-3">
                                    <label style="padding-right: 10px;">Govt ID : </label>
                                    <div style="display: flex; align-items: center;">
                                        <input type="file" name="govtIdFile" required>
                                    </div>
                                </div>

                                <div class="input-group input-group-outline mb-3">
                                    <label class="form-label"></label>
                                    <input type="text" th:field="*{govtIdNumber}" placeholder="Government Id Number*"  class="form-control" required> 
                                </div>

                                <div class="input-group input-group-outline my-3">
                                    <label class="form-label"></label>
                                    <input type="text" th:field="*{website}" placeholder="Website (If Any)" class="form-control">
                                </div>

                                <div class="input-group input-group-outline my-3">
                                    <label class="form-label"></label>
                                    <input type="text" th:field="*{foodProductSize}" placeholder="Food Product details" class="form-control">
                                </div>

                                <div class="input-group input-group-outline my-3">
                                    <label class="form-label"></label>
                                    <input type="text" th:field="*{manufacturingUnit}" placeholder="Is manufacturing and packaging in a separate unit?" class="form-control">
                                </div>

                                <div class="input-group input-group-outline mb-3">
                                    <label class="form-label"></label>
                                    <input type="text" th:field="*{enrolledBy}" placeholder="Enrolled by:" class="form-control">
                                </div>
                                <div class="text-center">
                                    <button type="submit" class="btn bg-gradient-pavnam w-100 my-4 mb-2" style="color: white;">Sign in</button>
                                </div>
                                <div class="card-footer text-center pt-0 px-lg-2 px-1" style="background-color: white;">
                                    <p class="mb-2 text-sm mx-auto">
                                      Already have an account?
                                      <a th:href="@{/login}" class="font-weight-bold" style="color: #ff7722;">Sign in</a>
                                    </p>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
      <footer class="footer position-absolute bottom-2 py-2 w-100">
        <div class="container">
          <div class="row align-items-center justify-content-lg-between">
            <div class="col-12 col-md-6 my-auto">
              <div class="copyright text-center text-sm text-white text-lg-start">
                Â© <script>
                  document.write(new Date().getFullYear())
                </script>,
                All Rights Reserved <i class="fa fa-heart" aria-hidden="true"></i> by
                <a href="/" class="font-weight-bold text-white" target="_blank">Pavnam</a>
              </div>
            </div>
          </div>
        </div>
      </footer>
    </div>
  </main>
  <!--   Core JS Files   -->
  <script src="/js/core/popper.min.js"></script>
  <script src="/js/core/bootstrap.min.js"></script>
  <script src="/js/plugins/perfect-scrollbar.min.js"></script>
  <script src="/js/plugins/smooth-scrollbar.min.js"></script>
  <script>
    var win = navigator.platform.indexOf('Win') > -1;
    if (win && document.querySelector('#sidenav-scrollbar')) {
      var options = {
        damping: '0.5'
      }
      Scrollbar.init(document.querySelector('#sidenav-scrollbar'), options);
    }
  </script>
  <!-- Github buttons -->
  <script async defer src="https://buttons.github.io/buttons.js"></script>
  <!-- Control Center for Material Dashboard: parallax effects, scripts for the example pages etc -->
  <script src="/js/material-dashboard.min.js?v=3.2.0"></script>
</body>

</html>
