  <main class="main-content mt-0">
    <section class="bg-gradient-pavnam">
      <div class="page-header min-vh-100">
        <div class="container">
          <div class="row">
            <div class="col-6 d-lg-flex d-none start-0 text-center justify-content-center flex-column" style="padding-top: 100px;">
              <div class="position-relative bg-gradient-primary h-100 m-3 px-7 border-radius-lg d-flex flex-column justify-content-center" style="background-image: url('/img/distributor4.jpg'); background-size: cover;">
              </div>
            </div>
            <div class="col-xl-5 col-lg-5 col-md-7 d-flex flex-column ms-auto me-auto ms-lg-auto me-lg-4" style="padding-top: 70px;">
              <div class="card card-plain" style="margin-top: 50px; margin-bottom: 15px;">
                <div class="card-header" style="text-align: center;">
                  <h4 class="font-weight-bolder" style="color: #13547a;">Distributor's Application</h4>
                  <p class="mb-0">Apply to be a Pavnam Certificate Distributor!</p>
                </div>
                <div class="card-body" style="background-color: white;">
                  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                  <form th:action="@{/add/admin}" method="post" th:object="${dealerForm}" enctype="multipart/form-data">
                    <div class="input-group input-group-outline mb-3">
                      <label class="form-label"></label>
                      <input type="text" th:field="*{username}" placeholder="Username*" class="form-control" required>
                    </div>
                    <div class="input-group input-group-outline mb-3">
                      <label class="form-label"></label>
                      <input type="email" th:field="*{email}" placeholder="Email Id*" class="form-control" required>
                    </div>
                    <div class="input-group input-group-outline mb-3">
                      <label class="form-label"></label>
                      <input type="text" th:field="*{fullName}" placeholder="Full Name*" class="form-control" required>
                    </div>
                    <div class="input-group input-group-outline mb-3">
                      <label class="form-label"></label>
                      <input type="tel" th:field="*{mobile}" placeholder="Mobile Number*" class="form-control" required>
                    </div>
                    <div class="input-group input-group-outline mb-3">
                      <label class="form-label"></label>
                      <input type="text" th:field="*{city}" placeholder="City" class="form-control">
                    </div>
                    <div class="input-group input-group-outline mb-3">
                      <label class="form-label"></label>
                      <input type="text" th:field="*{state}" placeholder="State" class="form-control">
                    </div>
                    <div class="input-group input-group-outline mb-3">
                      <label class="form-label"></label>
                      <input type="text" th:field="*{address}" placeholder="Address*" class="form-control" required>
                    </div>
                    <div class="input-group input-group-outline mb-3">
                      <label class="form-label"></label>
                      <select class="form-select form-control" id="governmentId" th:field="*{govtId}" placeholder="Select Government Id" required>
                        <option value="Select Government ID">Select Government ID*</option>
                        <option value="Aadhar Card">Aadhar Card</option>
                        <option value="PAN Card">Pan Card</option>
                        <option value="Voters Id">Voters ID</option>
                        <option value="Driving Licence">Driving Licence</option>
                      </select>
                    </div>
                    <div class="input-group input-group-outline mb-3">
                      <label class="form-label"></label>
                      <input type="text" th:field="*{govtIdNumber}" placeholder="Government Id Number*" class="form-control" required>
                    </div>
                    <div class="form-group">
                      <label for="govtIdFile" class="form-label">Government ID:</label>
                      <input type="file" id="govtIdFile" name="govtIdFile" accept="image/*" style="margin-bottom: 15px; width: 60%;" />
                    </div>
                    <div class="form-group">
                      <label for="profilePicFile" class="form-label">Profile Picture:</label>
                      <input type="file" id="profilePicFile" name="profilePicFile" accept="image/*" style="margin-bottom: 15px; width: 60%;" />
                    </div>
                    <div class="input-group input-group-outline mb-3">
                      <label class="form-label"></label>
                      <input type="password" th:field="*{password}" placeholder="Set Password*" class="form-control" required>
                      <button type="button" class="btn" onclick="togglePasswordVisibility('password', this)" style="background-color: #13547a; margin-bottom: 0; padding: 10px; margin-left: 5px; border-radius: 5px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" class="bi bi-eye" viewBox="0 0 16 16" id="eye-icon-password">
                          <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                          <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                        </svg>
                      </button>
                    </div>
                    <!-- <div class="input-group input-group-outline mb-3">
                      <label class="form-label"></label>
                      <input type="password" th:field="*{repassword}" placeholder="Re-type Password*" class="form-control" required>
                      <button type="button" class="btn btn-outline-secondary" onclick="togglePasswordVisibility('repassword', this)" style="background-color: #13547a; margin-bottom: 0; padding: 10px; margin-left: 5px; border-radius: 5px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" class="bi bi-eye" viewBox="0 0 16 16" id="eye-icon-repassword">
                          <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                          <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                        </svg>
                      </button>
                    </div> -->
                    <div class="input-group input-group-outline mb-3">
                      <label class="form-label"></label>
                      <input type="password" id="repassword" name="repassword" placeholder="Re-type Password*" class="form-control" required>
                      <button type="button" class="btn" onclick="togglePasswordVisibility('repassword', this)" style="background-color: #13547a; margin-bottom: 0; padding: 10px; margin-left: 5px; border-radius: 5px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" class="bi bi-eye" viewBox="0 0 16 16" id="eye-icon-repassword">
                          <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                          <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                        </svg>
                      </button>
                    </div>
                    <div class="text-center">
                      <button type="submit" class="btn btn-lg btn-lg w-100 mt-4 mb-0" style="color: white; background-color: #13547a;">Sign Up</button>
                    </div>
                  </form>
                </div>
                <div class="card-footer text-center pt-0 px-lg-2 px-1" style="background-color: white;">
                  <p class="mb-2 text-sm mx-auto">

                    <a th:href="@{/login}" class="font-weight-bold" style="color: #ff7722;">Sign in</a>
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>

<!-- Add this JavaScript code right before the closing </body> tag -->
<script>
  document.querySelector('form').addEventListener('submit', function(e) {
      const password = document.querySelector('input[name="password"]').value;
      const repassword = document.querySelector('input[name="repassword"]').value;
      
      if (password !== repassword) {
          e.preventDefault(); // Prevent form submission
          alert('Passwords do not match! Please try again.');
          return false;
      }
      return true;
  });
  
  // Update the togglePasswordVisibility function to work with both password fields
  function togglePasswordVisibility(inputId, button) {
      const input = document.getElementById(inputId);
      const icon = button.querySelector('svg');
      
      if (input.type === 'password') {
          input.type = 'text';
          icon.style.fill = '#13547a';
      } else {
          input.type = 'password';
          icon.style.fill = 'white';
      }
  }
  </script>
