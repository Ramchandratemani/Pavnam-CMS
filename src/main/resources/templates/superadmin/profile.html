    <!-- Side Nav Bar End -->

    <main class="main-content position-relative max-height-vh-100 h-100 border-radius-lg ">

        <!-- Navbar Start -->
        <nav class="navbar navbar-main navbar-expand-lg px-0 mx-3 shadow-none border-radius-xl" id="navbarBlur" data-scroll="true">
            <div class="container-fluid py-1 px-3">
                <div class="mb-1 pb-0 pt-1 px-0 me-sm-10 me-5">
                    <h4 style="color: #13547a; font-family: 'Montserrat', sans-serif;">Welcome Super Admin</h4>
                </div>
                <div class="collapse navbar-collapse mt-sm-0 mt-2 me-md-0 me-sm-4 justify-content-end" id="navbar">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb bg-transparent mb-1 pb-0 pt-1 px-0 me-sm-3 me-5">
                            <li class="breadcrumb-item text-sm"><a class="opacity-5 text-dark" href="javascript: ;">Super Admin</a></li>
                            <li class="breadcrumb-item text-sm text-dark active" aria-current="page">Profile</li>

                    </nav>
                    <ul class="navbar-nav d-flex align-items-center justify-content-end">
                        <li class="nav-item d-xl-none ps-3 d-flex align-items-center">
                            <a href="javascript:;" class="nav-link text-body p-0" id="iconNavbarSidenav">

                                    <i class="sidenav-toggler-line"></i>

                    </ul>
                </div>
            </div>
        </nav>
        <!-- End Navbar -->

        <div class="container-fluid py-4">
            <div class="row">
                <div class="col-12">
                    <div class="card border-0 shadow-lg">
                        <div class="card-header p-3" style="background-color: #13547a;">
                            <h5 class="mb-0 text-white text-center">Profile Information</h5>
                        </div>
                        <div class="card-body p-4" >
                            <form th:attr="action=@{/api/superadmin/{id}(id=${superAdmin.id})}" method="post" enctype="multipart/form-data" id="superAdminForm">
                                <input type="hidden" name="_method" value="PUT">
                                <div class="row ">
                                    <div class="col-12 col-md-6">
                                        <p><strong>Username:</strong> <span th:text="${superAdmin.username}"></span></p>
                                        <p><strong>Email:</strong> <span th:text="${superAdmin.email}"></span></p>
                                    </div>

                                    <div class="col-12 col-md-6">
                                        <p><strong>Name:</strong> <span th:text="${superAdmin.name}"></span></p>
                                        <p><strong>Role:</strong> <span th:text="${superAdmin.role}"></span></p>
                                    </div>

                                    <div style="margin-top: 10px;">
                                        <form id="changePasswordForm">
                                            <div class="form-group row input-group input-group-outline mb-3">
                                                <label for="currentPassword" class="col-4 col-sm-3 col-form-label" style="margin-left: 0;"><strong>Current Password:</strong></label>
                                                <div class="col-6">
                                                    <input type="password" id="currentPassword" name="currentPassword" class="form-control" required>
                                                </div>
                                                <div class="col-2">
                                                    <button type="button" onclick="togglePasswordVisibility('currentPassword')" class="btn btn-light " style="background-color: #13547a; ">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" class="bi bi-eye" viewBox="0 0 16 16" id="currentpassword">
                                                            <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                                                            <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                                                        </svg>
                                                    </button>
                                                </div>
                                            </div>
                                            <div class="form-group row input-group input-group-outline mb-3">
                                                <label for="newPassword" class="col-4 col-sm-3 col-form-label" style="margin-left: 0;"><strong>New Password:</strong></label>
                                                <div class="col-6">
                                                    <input type="password" id="newPassword" name="newPassword" class="form-control" required>
                                                </div>
                                                <div class="col-2">
                                                    <button type="button" onclick="togglePasswordVisibility('newPassword')" class="btn btn-light" style="background-color: #13547a; ">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" class="bi bi-eye" viewBox="0 0 16 16" id="newPassword">
                                                            <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                                                            <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                                                        </svg>
                                                    </button>
                                                </div>
                                            </div>
                                            <div class="form-group row input-group input-group-outline mb-3">
                                                <label for="confirmPassword" class="col-4 col-sm-3 col-form-label" style="margin-left: 0;"><strong>Confirm Password:</strong></label>
                                                <div class="col-6">
                                                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required>
                                                </div>
                                                <div class="col-2">
                                                    <button type="button" onclick="togglePasswordVisibility('confirmPassword')" class="btn btn-light" style="background-color: #13547a; ">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" class="bi bi-eye" viewBox="0 0 16 16" id="confirmPassword">
                                                            <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                                                            <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                                                        </svg>
                                                    </button>
                                                </div>
                                            </div>
                                            <div class="col-12 text-center">
                                                <button type="button" class="btn text-white mt-3" style="background-color: #ff7722; width: 100%; max-width: 300px;" onclick="validateAndChangePassword()">Change Password</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </form>
                        </div>

    <!-- Core JS Files -->
    <script src="/js/core/popper.min.js"></script>
    <script src="/js/core/bootstrap.min.js"></script>
    <script src="/js/plugins/perfect-scrollbar.min.js"></script>
    <script src="/js/plugins/smooth-scrollbar.min.js"></script>
    <script src="/js/plugins/chartjs.min.js"></script>
    <script src="/js/main.js"></script>
    <script>
        function makeEditable(fieldId) {
            const field = document.getElementById(fieldId);
            field.readOnly = false;
            field.focus();
        }

        function togglePasswordVisibility(fieldId) {
            const passwordField = document.getElementById(fieldId);
            const currentType = passwordField.getAttribute('type');
            passwordField.setAttribute('type', currentType === 'password' ? 'text' : 'password');
        }

        function confirmUpdate() {
            const confirmation = confirm("Are you sure you want to update your profile?");
            if (confirmation) {
                document.getElementById('superAdminForm').submit();
            }
        }

        function validateAndChangePassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                alert("New password and confirm password do not match.");
                return;
            }

            if (newPassword.length < 8) {
                alert("Password must be at least 8 characters long.");
                return;
            }

            changePassword();
        }

        function changePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;

            const data = {
                currentPassword: currentPassword,
                newPassword: newPassword
            };

            fetch('/api/dealers/change-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(err => { throw new Error(err.message); });
                }
                return response.json();
            })
            .then(data => {
                alert(data.message); // Show success message
                window.location.reload(); // Reload the page
            })
            .catch(error => {
                console.error('Error:', error);
                alert("An error occurred: " + error.message);
            });
        }
    </script>
</body>
</html>
